name: Deploy web (Cloudflare Pages)

# Builds the marketing site (apps/web) as a static export and deploys it to
# Cloudflare Pages on every push to main that touches the site. Also runnable
# manually from the Actions tab ("Run workflow").
#
# Required repository secret (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   API token with "Account › Cloudflare Pages › Edit"
#
# The Cloudflare account ID is not secret (it appears in dashboard URLs), so it
# is hard-coded below. Change SITE_URL once you bind a custom domain.

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

# A newer push supersedes an in-flight deploy.
concurrency:
  group: deploy-web
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Public URL baked into canonical / OG / sitemap at build time.
  SITE_URL: https://groveworktree.pages.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm --filter web build
        env:
          BUILD_STATIC: "1"
          NEXT_PUBLIC_SITE_URL: ${{ env.SITE_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "64312a756c15aed9bdc4e5943d66b9ab"
          command: pages deploy apps/web/out --project-name groveworktree --branch main
